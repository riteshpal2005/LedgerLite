name: Build and Release Android APKs

on:
  push:
    tags:
      - 'v*' # Trigger when a tag starting with "v" is pushed (e.g. v1.2.0)

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Reconstruct .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PbuildArm64Only

      - name: Rename Artifacts
        run: |
          mv android/app/build/outputs/apk/release/app-arm64-v8a-release.apk LedgerLite-${{ github.ref_name }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LedgerLite-${{ github.ref_name }}-APK
          path: LedgerLite-${{ github.ref_name }}.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LedgerLite-${{ github.ref_name }}.apk
          name: LedgerLite ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
